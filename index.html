<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Math Bot - Тренажёр по математике</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            color: white;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #667eea);
        }

        .stat-label {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.7;
        }

        /* Task Card */
        .task-card {
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            border-radius: 20px;
            padding: 40px 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .task-expression {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 30px;
            font-family: 'Courier New', monospace;
        }

        .answer-input {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            text-align: center;
            border: 2px solid var(--tg-theme-button-color, #667eea);
            border-radius: 15px;
            background: var(--tg-theme-bg-color, white);
            color: var(--tg-theme-text-color, black);
            margin-bottom: 15px;
        }

        .answer-input:focus {
            outline: none;
            border-color: #764ba2;
        }

        /* Buttons */
        .button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .button-primary {
            background: var(--tg-theme-button-color, #667eea);
            color: var(--tg-theme-button-text-color, white);
        }

        .button-primary:active {
            transform: scale(0.98);
        }

        .button-secondary {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            color: var(--tg-theme-text-color, black);
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        /* Feedback */
        .feedback {
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Settings Panel */
        .settings-panel {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .settings-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .theme-buttons, .level-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .theme-btn, .level-btn {
            padding: 10px;
            border: 2px solid var(--tg-theme-button-color, #667eea);
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--tg-theme-text-color, black);
        }

        .theme-btn.active, .level-btn.active {
            background: var(--tg-theme-button-color, #667eea);
            color: white;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 3px solid var(--tg-theme-secondary-bg-color, #f3f3f3);
            border-top: 3px solid var(--tg-theme-button-color, #667eea);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .task-expression {
                font-size: 36px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧮 Математический тренажёр</h1>
            <p>Решай примеры и повышай уровень!</p>
        </div>

        <div id="statsContainer" class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">Очки</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">Уровень</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="correct">0</div>
                <div class="stat-label">Правильно</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accuracy">0%</div>
                <div class="stat-label">Точность</div>
            </div>
        </div>

        <div id="taskContainer">
            <div class="task-card">
                <div class="task-expression" id="expression">5 + 3 = ?</div>
                <input type="number" id="answer" class="answer-input" placeholder="Введи ответ" inputmode="numeric">
                <button class="button button-primary" onclick="checkAnswer()">✅ Проверить</button>
                <button class="button button-secondary" onclick="newTask()">🎯 Новый пример</button>
            </div>
        </div>

        <div id="feedback"></div>

        <div class="settings-panel">
            <div class="settings-title">📚 Выбери тему</div>
            <div class="theme-buttons" id="themeButtons">
                <button class="theme-btn" data-theme="addition">➕ Сложение</button>
                <button class="theme-btn" data-theme="subtraction">➖ Вычитание</button>
                <button class="theme-btn" data-theme="multiplication">✖️ Умножение</button>
                <button class="theme-btn" data-theme="division">➗ Деление</button>
                <button class="theme-btn" data-theme="equations">🔢 Уравнения</button>
                <button class="theme-btn" data-theme="fractions">🧮 Дроби</button>
            </div>

            <div class="settings-title">⭐ Уровень сложности</div>
            <div class="level-buttons" id="levelButtons">
                <button class="level-btn" data-level="1">Уровень 1</button>
                <button class="level-btn" data-level="2">Уровень 2</button>
                <button class="level-btn" data-level="3">Уровень 3</button>
            </div>
        </div>

        <div class="grid-buttons">
            <button class="button button-secondary" onclick="getStats()">📊 Статистика</button>
            <button class="button button-secondary" onclick="getRating()">🏆 Рейтинг</button>
            <button class="button button-secondary" onclick="getDailyBonus()">🎁 Бонус</button>
            <button class="button button-secondary" onclick="startExam()">📚 Экзамен</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        
        let currentTask = null;
        let currentTheme = 'addition';
        let currentLevel = 1;
        let examMode = false;
        let examQuestions = [];
        let examCurrent = 0;
        let examCorrect = 0;

        // Инициализация
        tg.MainButton.setText("Отправить ответ");
        tg.MainButton.onClick(checkAnswer);
        
        // Загрузка данных пользователя
        loadUserData();
        
        // Обработчики кнопок тем
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTheme = btn.dataset.theme;
                saveSettings();
                newTask();
            });
        });
        
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = parseInt(btn.dataset.level);
                saveSettings();
                newTask();
            });
        });
        
        function loadUserData() {
            tg.sendData(JSON.stringify({ action: 'getUserData' }));
            // Ждём ответ от бота
            window.addEventListener('message', function(event) {
                if (event.data.type === 'userData') {
                    updateUI(event.data.data);
                }
            });
        }
        
        function updateUI(data) {
            document.getElementById('score').textContent = data.score || 0;
            document.getElementById('level').textContent = data.level || 1;
            document.getElementById('correct').textContent = data.total_correct || 0;
            
            let accuracy = data.total_answered > 0 ? 
                (data.total_correct / data.total_answered * 100).toFixed(1) : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';
            
            currentTheme = data.theme || 'addition';
            currentLevel = data.level || 1;
            
            // Активируем соответствующие кнопки
            document.querySelectorAll('.theme-btn').forEach(btn => {
                if (btn.dataset.theme === currentTheme) {
                    btn.classList.add('active');
                }
            });
            
            document.querySelectorAll('.level-btn').forEach(btn => {
                if (parseInt(btn.dataset.level) === currentLevel) {
                    btn.classList.add('active');
                }
            });
        }
        
        function saveSettings() {
            tg.sendData(JSON.stringify({
                action: 'saveSettings',
                theme: currentTheme,
                level: currentLevel
            }));
        }
        
        async function newTask() {
            showLoading();
            tg.sendData(JSON.stringify({
                action: 'newTask',
                theme: currentTheme,
                level: currentLevel
            }));
        }
        
        function checkAnswer() {
            let answer = document.getElementById('answer').value;
            if (!answer) {
                showFeedback('Введи ответ!', 'error');
                return;
            }
            
            tg.sendData(JSON.stringify({
                action: 'checkAnswer',
                answer: parseFloat(answer),
                examMode: examMode
            }));
        }
        
        function getStats() {
            tg.sendData(JSON.stringify({ action: 'getStats' }));
        }
        
        function getRating() {
            tg.sendData(JSON.stringify({ action: 'getRating' }));
        }
        
        function getDailyBonus() {
            tg.sendData(JSON.stringify({ action: 'dailyBonus' }));
        }
        
        function startExam() {
            examMode = true;
            examQuestions = [];
            examCurrent = 0;
            examCorrect = 0;
            
            tg.sendData(JSON.stringify({
                action: 'startExam',
                theme: currentTheme,
                level: currentLevel
            }));
        }
        
        function showFeedback(message, type) {
            let feedbackDiv = document.getElementById('feedback');
            feedbackDiv.innerHTML = `<div class="feedback feedback-${type}">${message}</div>`;
            setTimeout(() => {
                feedbackDiv.innerHTML = '';
            }, 3000);
        }
        
        function showLoading() {
            document.getElementById('taskContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Загрузка...</p>
                </div>
            `;
        }
        
        function updateTask(expression, answer) {
            currentTask = answer;
            document.getElementById('taskContainer').innerHTML = `
                <div class="task-card">
                    <div class="task-expression" id="expression">${expression} = ?</div>
                    <input type="number" id="answer" class="answer-input" placeholder="Введи ответ" inputmode="numeric">
                    <button class="button button-primary" onclick="checkAnswer()">✅ Проверить</button>
                    <button class="button button-secondary" onclick="newTask()">🎯 Новый пример</button>
                </div>
            `;
        }
        
        function updateExam(question, current, total) {
            document.getElementById('taskContainer').innerHTML = `
                <div class="task-card">
                    <div class="task-expression" id="expression">${question} = ?</div>
                    <div style="margin-bottom: 10px; font-size: 14px;">Вопрос ${current} из ${total}</div>
                    <input type="number" id="answer" class="answer-input" placeholder="Введи ответ" inputmode="numeric">
                    <button class="button button-primary" onclick="checkAnswer()">✅ Ответить</button>
                </div>
            `;
        }
        
        function showExamResult(correct, total, grade) {
            examMode = false;
            let message = `📊 Результаты экзамена:\n✅ Правильно: ${correct}/${total}\n📝 Оценка: ${grade}`;
            if (correct === total) {
                message += '\n🏆 ИДЕАЛЬНО! Ты настоящий математик!';
            }
            showFeedback(message, correct === total ? 'success' : 'info');
            loadUserData(); // Обновляем статистику
        }
        
        // Обработка сообщений от бота
        window.addEventListener('message', function(event) {
            const data = event.data;
            
            switch(data.type) {
                case 'newTask':
                    updateTask(data.expression, data.answer);
                    break;
                    
                case 'answerResult':
                    if (data.correct) {
                        showFeedback('✅ Верно! +1 очко!', 'success');
                        loadUserData(); // Обновляем статистику
                        if (!examMode) {
                            newTask(); // Новый пример
                        }
                    } else {
                        showFeedback(`❌ Неверно! Правильный ответ: ${data.correctAnswer}`, 'error');
                        document.getElementById('answer').value = '';
                    }
                    break;
                    
                case 'examQuestion':
                    updateExam(data.question, data.current, data.total);
                    break;
                    
                case 'examResult':
                    showExamResult(data.correct, data.total, data.grade);
                    break;
                    
                case 'stats':
                    showFeedback(data.text, 'info');
                    break;
                    
                case 'rating':
                    showFeedback(data.text, 'info');
                    break;
                    
                case 'dailyBonus':
                    showFeedback(data.message, data.success ? 'success' : 'info');
                    loadUserData();
                    break;
                    
                case 'userData':
                    updateUI(data.data);
                    break;
            }
        });
        
        // Запрашиваем первый пример
        setTimeout(() => {
            newTask();
        }, 500);
    </script>
</body>
</html>
