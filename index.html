<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Тест Web App</title>
</head>
<body>
    <h1>🧮 Тест Web App</h1>
    <p>Web App работает!</p>
    <button onclick="sendTest()">Отправить тест боту</button>
    <button onclick="closeApp()">Закрыть</button>
    
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        function sendTest() {
            tg.sendData(JSON.stringify({
                action: 'test',
                message: 'Привет от Web App!'
            }));
            alert('Данные отправлены боту!');
        }
        
        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
