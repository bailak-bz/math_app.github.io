<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Math Bot - Тренажёр по математике</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            color: white;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #667eea);
        }

        .stat-label {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.7;
        }

        .task-card {
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            border-radius: 20px;
            padding: 40px 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .task-expression {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 30px;
            font-family: 'Courier New', monospace;
        }

        .answer-input {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            text-align: center;
            border: 2px solid var(--tg-theme-button-color, #667eea);
            border-radius: 15px;
            background: var(--tg-theme-bg-color, white);
            color: var(--tg-theme-text-color, black);
            margin-bottom: 15px;
        }

        .button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .button-primary {
            background: var(--tg-theme-button-color, #667eea);
            color: var(--tg-theme-button-text-color, white);
        }

        .button-secondary {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            color: var(--tg-theme-text-color, black);
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .feedback {
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 3px solid var(--tg-theme-secondary-bg-color, #f3f3f3);
            border-top: 3px solid var(--tg-theme-button-color, #667eea);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧮 Математический тренажёр</h1>
            <p>Решай примеры и повышай уровень!</p>
        </div>

        <div id="statsContainer" class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">Очки</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="level">1</div>
                <div class="stat-label">Уровень</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="correct">0</div>
                <div class="stat-label">Правильно</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accuracy">0%</div>
                <div class="stat-label">Точность</div>
            </div>
        </div>

        <div id="taskContainer">
            <div class="task-card">
                <div class="task-expression" id="expression">5 + 3 = ?</div>
                <input type="number" id="answer" class="answer-input" placeholder="Введи ответ" inputmode="numeric">
                <button class="button button-primary" onclick="checkAnswer()">✅ Проверить</button>
                <button class="button button-secondary" onclick="newTask()">🎯 Новый пример</button>
            </div>
        </div>

        <div id="feedback"></div>

        <div class="grid-buttons">
            <button class="button button-secondary" onclick="getStats()">📊 Статистика</button>
            <button class="button button-secondary" onclick="getDailyBonus()">🎁 Бонус</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        
        let currentAnswer = null;
        
        // Отправляем данные боту через Telegram
        function sendToBot(action, data = {}) {
            const message = JSON.stringify({
                action: action,
                ...data
            });
            
            // Отправляем данные боту
            tg.sendData(message);
            
            // Показываем, что данные отправлены
            console.log('Отправлено боту:', message);
        }
        
        // Получаем новый пример
        function newTask() {
            showLoading();
            sendToBot('newTask');
        }
        
        // Проверяем ответ
        function checkAnswer() {
            let answer = document.getElementById('answer').value;
            if (!answer) {
                showFeedback('Введи ответ!', 'error');
                return;
            }
            
            sendToBot('checkAnswer', { answer: parseFloat(answer) });
        }
        
        // Получаем статистику
        function getStats() {
            sendToBot('getStats');
        }
        
        // Получаем бонус
        function getDailyBonus() {
            sendToBot('dailyBonus');
        }
        
        function showFeedback(message, type) {
            let feedbackDiv = document.getElementById('feedback');
            feedbackDiv.innerHTML = `<div class="feedback feedback-${type}">${message}</div>`;
            setTimeout(() => {
                feedbackDiv.innerHTML = '';
            }, 3000);
        }
        
        function showLoading() {
            document.getElementById('taskContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Загрузка...</p>
                </div>
            `;
        }
        
        function updateTask(expression, answer) {
            currentAnswer = answer;
            document.getElementById('taskContainer').innerHTML = `
                <div class="task-card">
                    <div class="task-expression" id="expression">${expression} = ?</div>
                    <input type="number" id="answer" class="answer-input" placeholder="Введи ответ" inputmode="numeric">
                    <button class="button button-primary" onclick="checkAnswer()">✅ Проверить</button>
                    <button class="button button-secondary" onclick="newTask()">🎯 Новый пример</button>
                </div>
            `;
        }
        
        function updateStats(score, level, correct, accuracy) {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('correct').textContent = correct;
            document.getElementById('accuracy').textContent = accuracy + '%';
        }
        
        // Обработка ответов от бота
        tg.onEvent('mainButtonClicked', function() {
            checkAnswer();
        });
        
        // Запрашиваем первый пример при загрузке
        setTimeout(() => {
            newTask();
        }, 500);
    </script>
</body>
</html>
